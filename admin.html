<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | HerbalNepal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .gradient-bg { background: linear-gradient(135deg, #166534 0%, #064e3b 100%); }
    </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans">
    <header class="gradient-bg text-white p-6 shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold italic">HerbalNepal Admin</h1>
                <p class="text-xs text-green-200">Real-time Order Management</p>
            </div>
            <div class="bg-white/20 p-2 rounded-lg">
                <i class="fas fa-user-shield mr-2"></i>Admin Panel
            </div>
        </div>
    </header>

    <main class="container mx-auto p-4 lg:p-8">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-2xl shadow-sm border-l-4 border-green-600">
                <p class="text-gray-500 text-sm">Total Orders</p>
                <h3 id="stat-total-orders" class="text-3xl font-bold text-gray-800">0</h3>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border-l-4 border-orange-500">
                <p class="text-gray-500 text-sm">Total Revenue</p>
                <h3 id="stat-total-revenue" class="text-3xl font-bold text-gray-800">Rs. 0</h3>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border-l-4 border-blue-500">
                <p class="text-gray-500 text-sm">Active Customers</p>
                <h3 id="stat-active-customers" class="text-3xl font-bold text-gray-800">0</h3>
            </div>
        </div>

        <h2 class="text-xl font-bold text-gray-700 mb-4 flex items-center gap-2">
            <i class="fas fa-shopping-bag text-green-700"></i> Recent Orders
        </h2>
        
        <div id="order-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="text-center col-span-full py-10">
                <i class="fas fa-spinner animate-spin text-3xl text-green-700"></i>
                <p class="mt-2 text-gray-500">Fetching orders...</p>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, updateDoc, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBGk8yhlOug9krpLA8w-lWybDW8pZgkCgc",
            authDomain: "my-herbal.firebaseapp.com",
            projectId: "my-herbal",
            storageBucket: "my-herbal.firebasestorage.app",
            messagingSenderId: "717348772745",
            appId: "1:717348772745:web:024095bbcf970f9df11f58"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        onSnapshot(collection(db, "orders"), (querySnapshot) => {
            const container = document.getElementById('order-container');
            container.innerHTML = "";
            let totalOrders = 0;
            let totalRevenue = 0;

            querySnapshot.forEach((documentObj) => {
                const order = documentObj.data();
                const id = documentObj.id;
                totalOrders++;
                totalRevenue += parseInt(order.totalPrice || 0);

                container.innerHTML += `
                    <div class="bg-white p-5 rounded-2xl shadow-sm border-t-4 ${order.status === 'Paid' ? 'border-green-500' : 'border-red-500'} hover:shadow-md transition relative">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <span class="text-[10px] bg-gray-100 px-2 py-1 rounded text-gray-500 uppercase font-bold">ID: ${id.slice(0,6)}</span>
                                <p class="text-[10px] text-gray-400 mt-1">${order.orderTime}</p>
                            </div>
                            <span class="px-2 py-1 rounded-lg text-[10px] font-bold ${order.status === 'Paid' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">
                                ${order.status ? order.status.toUpperCase() : 'UNPAID'}
                            </span>
                        </div>
                        <div class="mb-4 p-3 bg-slate-50 rounded-xl">
                            <p class="text-sm font-bold text-gray-800">${order.customerName || 'Customer'}</p>
                            <p class="text-xs text-gray-600 mt-1">${order.customerPhone || 'N/A'}</p>
                        </div>
                        <p class="text-lg font-black text-green-800">Rs. ${order.totalPrice}</p>
                        <div class="flex gap-2 mt-4">
                            <button onclick="updateStatus('${id}')" class="flex-1 bg-green-600 text-white py-2 rounded-xl text-xs font-bold">Mark Paid</button>
                            <button onclick="deleteOrder('${id}')" class="bg-red-50 text-red-500 px-3 py-2 rounded-xl"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>`;
            });

            document.getElementById('stat-total-orders').innerText = totalOrders;
            document.getElementById('stat-total-revenue').innerText = "Rs. " + totalRevenue;
            document.getElementById('stat-active-customers').innerText = totalOrders;
        });

        window.updateStatus = async (id) => {
            if(confirm("Mark this order as Paid?")) {
                await updateDoc(doc(db, "orders", id), { status: "Paid" });
            }
        };

        window.deleteOrder = async (id) => {
            if(confirm("Delete this order?")) {
                await deleteDoc(doc(db, "orders", id));
            }
        };
    </script>
</body>
</html>
